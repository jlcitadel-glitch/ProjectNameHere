<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --p0: #ff4444;
    --p1: #ff8c00;
    --p2: #ffd700;
    --p3: #58a6ff;
    --p4: #8b949e;
    --bug: #f85149;
    --task: #3fb950;
    --feature: #a371f7;
    --open: #3fb950;
    --closed: #8b949e;
    --blocked: #f85149;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem;
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    min-width: 130px;
    text-align: center;
  }
  .stat-card .number {
    font-size: 2rem;
    font-weight: 700;
  }
  .stat-card .label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Priority breakdown bar */
  .priority-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 2rem;
    background: var(--surface);
  }
  .priority-bar .seg { transition: width 0.3s; }

  /* Filters */
  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.35rem 0.75rem;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-btn .count {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 0 0.4rem;
    margin-left: 0.3rem;
    font-size: 0.7rem;
  }

  /* Search */
  .search-box {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 0.5rem 0.75rem;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 2rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  thead th {
    background: var(--surface2);
    text-align: left;
    padding: 0.6rem 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-arrow { font-size: 0.7rem; margin-left: 0.25rem; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface); }
  tbody tr.closed-row { opacity: 0.5; }
  tbody td { padding: 0.5rem 0.75rem; vertical-align: top; }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-p0 { background: var(--p0); color: #fff; }
  .badge-p1 { background: var(--p1); color: #000; }
  .badge-p2 { background: var(--p2); color: #000; }
  .badge-p3 { background: var(--p3); color: #000; }
  .badge-p4 { background: var(--p4); color: #000; }

  .type-badge {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .type-bug { background: rgba(248,81,73,0.2); color: var(--bug); }
  .type-task { background: rgba(63,185,80,0.2); color: var(--task); }
  .type-feature { background: rgba(163,113,247,0.2); color: var(--feature); }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 0.35rem;
    vertical-align: middle;
  }
  .status-open { background: var(--open); }
  .status-closed { background: var(--closed); }
  .status-blocked { background: var(--blocked); }

  .agent-tag {
    display: inline-block;
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    padding: 0.05rem 0.4rem;
    border-radius: 4px;
    font-size: 0.7rem;
    margin-right: 0.2rem;
  }

  .bead-id {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .blocked-icon { color: var(--blocked); font-size: 0.75rem; }
  .title-text { color: var(--text); }

  /* Section headers */
  .section-header {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 2rem 0 0.75rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  /* Responsive */
  @media (max-width: 768px) {
    body { padding: 1rem; }
    .stats-bar { gap: 0.75rem; }
    .stat-card { min-width: 100px; padding: 0.75rem; }
    .stat-card .number { font-size: 1.5rem; }
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .toggle-row label { color: var(--text-muted); font-size: 0.85rem; cursor: pointer; }
  .toggle-row input[type="checkbox"] { accent-color: var(--accent); }
</style>
</head>

let currentPriorityFilter = 'all';
let currentTypeFilter = 'all';
let currentAgentFilter = 'all';
let sortCol = 1;
let sortAsc = true;

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('search').value.toLowerCase();
  const showClosed = document.getElementById('showClosed').checked;

  let filtered = issues.filter(issue => {
    if (!showClosed && issue.status === 'closed') return false;
    if (currentPriorityFilter !== 'all' && `p${issue.p}` !== currentPriorityFilter) return false;
    if (currentTypeFilter !== 'all' && issue.type !== currentTypeFilter) return false;
    if (currentAgentFilter !== 'all') {
      if (currentAgentFilter === 'unassigned') {
        if (issue.agents.length > 0) return false;
      } else {
        if (!issue.agents.includes(currentAgentFilter)) return false;
      }
    }
    if (search) {
      const haystack = `${issue.id} ${issue.title} ${issue.agents.join(' ')} ${issue.type} p${issue.p}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    let va, vb;
    switch(sortCol) {
      case 0: va = a.id; vb = b.id; break;
      case 1: va = a.p; vb = b.p; break;
      case 2: va = a.type; vb = b.type; break;
      case 3: va = a.status; vb = b.status; break;
      case 4: va = a.title.toLowerCase(); vb = b.title.toLowerCase(); break;
      case 5: va = a.agents.join(','); vb = b.agents.join(','); break;
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  tbody.innerHTML = filtered.map(issue => {
    const statusClass = issue.status === 'blocked' ? 'blocked' : issue.status;
    const statusLabel = issue.status === 'blocked' ? `blocked by ${issue.blockedBy}` : issue.status;
    const rowClass = issue.status === 'closed' ? 'closed-row' : '';
    const blockedIcon = issue.blockedBy ? ' <span class="blocked-icon" title="Blocked by ' + issue.blockedBy + '">&#x1f6ab;</span>' : '';
    const agentHtml = issue.agents.map(a => `<span class="agent-tag">${a}</span>`).join('');

    return `<tr class="${rowClass}" data-p="p${issue.p}" data-type="${issue.type}" data-status="${issue.status}" data-agents="${issue.agents.join(',')}">
      <td><span class="bead-id">${issue.id}</span></td>
      <td><span class="badge badge-p${issue.p}">P${issue.p}</span></td>
      <td><span class="type-badge type-${issue.type}">${issue.type}</span></td>
      <td><span class="status-dot status-${statusClass}"></span>${statusLabel}</td>
      <td><span class="title-text">${issue.title}</span>${blockedIcon}</td>
      <td>${agentHtml || '<span style="color:var(--text-muted)">—</span>'}</td>
    </tr>`;
  }).join('');
}

function setPriorityFilter(val) {
  currentPriorityFilter = val;
  document.querySelectorAll('#priorityFilters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === val));
  renderTable();
}

function setTypeFilter(val) {
  currentTypeFilter = val;
  document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === val));
  renderTable();
}

function setAgentFilter(val) {
  currentAgentFilter = val;
  document.querySelectorAll('#agentFilters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === val));
  renderTable();
}

function filterTable() { renderTable(); }

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

renderTable();
</script>
